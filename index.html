<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヒト vs AI 反射神経バトル</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>ヒト vs AI 反射神経バトル</h1>
      <p class="tagline">ターゲットを先に捕まえた方が勝ち。AIは何度もプレイで強くなる</p>
    </header>

    <main class="main">
      <section class="mode-tabs" role="tablist" aria-label="ゲームモード">
        <button type="button" class="mode-tab active" role="tab" aria-selected="true" data-mode="vs">対戦モード</button>
        <button type="button" class="mode-tab" role="tab" aria-selected="false" data-mode="learning">学習モード</button>
      </section>

      <section class="score-board">
        <div class="score human">
          <span id="score-human-label" class="label">ヒト</span>
          <span id="score-human" class="value">0</span>
        </div>
        <div class="timer">
          <span id="timer-display">60</span><span id="timer-suffix"> 秒</span>
        </div>
        <div class="score ai">
          <span class="label">AI</span>
          <span id="score-ai" class="value">0</span>
        </div>
      </section>

      <div class="game-area-wrap">
        <div id="game-field" class="game-field">
          <div id="target" class="target" aria-hidden="true"></div>
          <div id="ai-cursor" class="ai-cursor" aria-hidden="true"></div>
        </div>
      </div>

      <section class="controls">
        <button id="btn-start" class="btn btn-primary">スタート</button>
        <button id="btn-stop" class="btn btn-stop" style="display: none;">ストップ</button>
        <button id="btn-reset-learning" class="btn btn-secondary">学習をリセット</button>
        <button id="btn-export-rl" class="btn btn-secondary">学習データをエクスポート</button>
        <button id="btn-import-rl" class="btn btn-secondary">学習データをインポート</button>
        <input type="file" id="input-import-rl" accept=".json,application/json" style="display: none;">
      </section>

      <section class="history">
        <h2>スコア履歴</h2>
        <div id="score-history" class="score-history"></div>
      </section>
    </main>

    <footer class="footer">
      <p>AIは「方向スコア」のばらつきから距離を推測し、移動量を学習します。繰り返すとAIが強くなります。</p>
    </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/rl.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
